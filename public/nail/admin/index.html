<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#b51f68">
  <title>Nail Collection — Admin</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#100a0f;color:#f8edf3;font:14px Inter,system-ui,sans-serif;min-height:100vh}button,input,textarea{font:inherit}button{cursor:pointer}
    .login{min-height:100vh;display:grid;place-items:center;padding:20px}.card{background:#1c121a;border:1px solid #3c2131;border-radius:20px;padding:28px;width:min(390px,100%);box-shadow:0 24px 70px #0008}.brand{font-size:25px;font-weight:900}.brand span{color:#f062a6}.muted{color:#aa8e9d}.field{width:100%;background:#100a0f;color:#fff;border:1px solid #4a293b;border-radius:11px;padding:13px;margin:7px 0;outline:none}.field:focus{border-color:#f062a6}.primary{border:0;border-radius:11px;background:linear-gradient(135deg,#b51f68,#f062a6);color:#fff;padding:13px 18px;font-weight:800}.wide{width:100%;margin-top:10px}.error{color:#ff7d8c;margin-top:10px}
    #app{display:none}.top{position:sticky;top:0;z-index:5;background:#1c121aee;backdrop-filter:blur(12px);border-bottom:1px solid #3c2131;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}.actions{display:flex;gap:8px}.secondary{border:1px solid #4a293b;background:#251720;color:#ead6e1;border-radius:9px;padding:8px 12px}
    .wrap{max-width:1200px;margin:auto;padding:20px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:#1c121a;border:1px solid #3c2131;border-radius:14px;padding:16px}.stat strong{display:block;font-size:24px;color:#f062a6}.stat span{font-size:12px;color:#aa8e9d}
    .tools{display:flex;gap:9px;flex-wrap:wrap;margin:18px 0}.tools .field{margin:0;flex:1;min-width:220px;padding:10px}.filter{border:1px solid #4a293b;background:transparent;color:#c9aab9;border-radius:20px;padding:8px 13px}.filter.active{background:#b51f68;border-color:#b51f68;color:#fff}
    .table{overflow:auto;background:#1c121a;border:1px solid #3c2131;border-radius:14px}table{width:100%;border-collapse:collapse;min-width:800px}th,td{text-align:left;padding:12px;border-bottom:1px solid #2e1b27}th{font-size:11px;color:#aa8e9d;text-transform:uppercase}tr:last-child td{border-bottom:0}.badge{display:inline-block;border-radius:20px;padding:4px 9px;font-size:11px;font-weight:800}.paid{background:#123621;color:#72dfa0}.pending{background:#3c2b10;color:#ffd373}.sent{background:#152f46;color:#82c8ff}.failed{background:#421a23;color:#ff9eaa}.mini{border:1px solid #5a3147;background:#281723;color:#f0c8dc;border-radius:8px;padding:7px 10px}.empty{text-align:center;padding:45px;color:#aa8e9d}
    .overlay{position:fixed;inset:0;background:#000b;display:none;place-items:center;padding:18px;z-index:20}.modal{width:min(580px,100%);max-height:92vh;overflow:auto;background:#1c121a;border:1px solid #4a293b;border-radius:18px;padding:22px}.modal-head{display:flex;justify-content:space-between;gap:15px;align-items:center}.close{border:0;background:transparent;color:#fff;font-size:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}.info{background:#100a0f;border-radius:10px;padding:11px}.info small{display:block;color:#aa8e9d;margin-bottom:4px}.modal-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#2e1930;border:1px solid #f062a6;border-radius:10px;padding:10px 16px;display:none;z-index:30}
    @media(max-width:700px){.stats{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.top{padding:12px}.wrap{padding:12px}.brand{font-size:19px}}
  </style>
</head>
<body>
  <section class="login" id="login"><div class="card"><div class="brand">Nail Collection <span>Admin</span></div><p class="muted">Painel exclusivo de pedidos Nail.</p><input class="field" id="user" value="admin" placeholder="Usuário"><input class="field" id="password" type="password" placeholder="Senha"><button class="primary wide" id="enter">Entrar</button><div class="error" id="login-error"></div></div></section>
  <main id="app"><header class="top"><div class="brand">Nail <span>Admin</span></div><div class="actions"><button class="secondary" id="refresh">Atualizar</button><button class="secondary" id="logout">Sair</button></div></header><div class="wrap">
    <section class="stats"><div class="stat"><strong id="total">0</strong><span>Total de pedidos</span></div><div class="stat"><strong id="paid">0</strong><span>Pagos</span></div><div class="stat"><strong id="sent">0</strong><span>Entregues</span></div><div class="stat"><strong id="revenue">R$ 0</strong><span>Receita confirmada</span></div></section>
    <section class="tools"><button class="filter active" data-filter="all">Todos</button><button class="filter" data-filter="paid">Pagos</button><button class="filter" data-filter="pending">Pendentes</button><button class="filter" data-filter="sent">Entregues</button><input class="field" id="search" placeholder="Buscar nome, WhatsApp ou e-mail"></section>
    <div class="table"><table><thead><tr><th>Data</th><th>Cliente</th><th>WhatsApp</th><th>Valor</th><th>Pagamento</th><th>Entrega</th><th></th></tr></thead><tbody id="rows"></tbody></table><div class="empty" id="empty">Carregando pedidos...</div></div>
  </div></main>
  <div class="overlay" id="overlay"><div class="modal"><div class="modal-head"><div><div class="brand">Detalhes do pedido</div><div class="muted" id="modal-id"></div></div><button class="close" id="close">×</button></div><div class="grid" id="details"></div><label class="muted">Observações</label><textarea class="field" id="notes" rows="4"></textarea><div class="modal-actions"><button class="primary" id="save">Salvar observações</button><button class="secondary" id="resend">Reenviar pelo WhatsApp</button></div></div></div>
  <div class="toast" id="toast"></div>
<script>
let auth='',orders=[],filter='all',current=null;
const $=id=>document.getElementById(id), money=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}), date=v=>v?new Date(v).toLocaleString('pt-BR'):'—', esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(message){$('toast').textContent=message;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2500)}
async function request(path,options={}){options.headers={...(options.headers||{}),Authorization:auth};const r=await fetch(path,options);if(r.status===401)throw new Error('unauthorized');const d=await r.json();if(!r.ok)throw new Error(d.error||'request_failed');return d}
async function login(){auth='Basic '+btoa(($('user').value||'admin')+':'+$('password').value);try{await load();sessionStorage.setItem('nailAdminAuth',auth);$('login').style.display='none';$('app').style.display='block'}catch{$('login-error').textContent='Usuário ou senha incorretos.'}}
async function load(){const d=await request('/nail-admin-orders');orders=d.orders||[];render()}
function render(){const paid=orders.filter(o=>o.paid),delivered=orders.filter(o=>o.deliverySent);$('total').textContent=orders.length;$('paid').textContent=paid.length;$('sent').textContent=delivered.length;$('revenue').textContent=money(paid.reduce((s,o)=>s+Number(o.value||0),0));const q=$('search').value.toLowerCase();const visible=orders.filter(o=>{if(filter==='paid'&&!o.paid)return false;if(filter==='pending'&&o.paid)return false;if(filter==='sent'&&!o.deliverySent)return false;return [o.name,o.email,o.phone,o.paymentId].join(' ').toLowerCase().includes(q)});$('empty').style.display=visible.length?'none':'block';$('empty').textContent='Nenhum pedido encontrado.';$('rows').innerHTML=visible.map(o=>`<tr><td>${esc(date(o.created_at))}</td><td><strong>${esc(o.name)}</strong><br><small class="muted">${esc(o.email)}</small></td><td>${esc(o.phone)}</td><td>${money(o.value)}</td><td><span class="badge ${o.paid?'paid':'pending'}">${o.paid?'Pago':'Pendente'}</span></td><td><span class="badge ${o.deliverySent?'sent':'failed'}">${o.deliverySent?'Enviado':'Não enviado'}</span></td><td><button class="mini" data-id="${esc(o.paymentId)}">Detalhes</button></td></tr>`).join('');document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>openOrder(b.dataset.id))}
function openOrder(id){current=orders.find(o=>o.paymentId===id);if(!current)return;$('modal-id').textContent=current.paymentId;$('details').innerHTML=[['Cliente',current.name],['E-mail',current.email],['WhatsApp',current.phone],['CPF',current.cpf],['Valor',money(current.value)],['Criado em',date(current.created_at)],['Pagamento',current.paid?'Confirmado':'Pendente'],['Entrega',current.deliverySent?'Enviada':'Não enviada']].map(([k,v])=>`<div class="info"><small>${k}</small>${esc(v)}</div>`).join('');$('notes').value=current.notes||'';$('resend').disabled=!current.paid;$('overlay').style.display='grid'}
$('enter').onclick=login;$('password').onkeydown=e=>{if(e.key==='Enter')login()};$('refresh').onclick=()=>load().then(()=>toast('Atualizado'));$('logout').onclick=()=>{sessionStorage.removeItem('nailAdminAuth');location.reload()};$('search').oninput=render;document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()});$('close').onclick=()=>$('overlay').style.display='none';$('overlay').onclick=e=>{if(e.target===$('overlay'))$('overlay').style.display='none'};
$('save').onclick=async()=>{await request('/nail-admin-orders?paymentId='+encodeURIComponent(current.paymentId),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:$('notes').value})});current.notes=$('notes').value;toast('Observações salvas.')};
$('resend').onclick=async()=>{if(!confirm('Reenviar o link do Nail Collection para este cliente?'))return;$('resend').disabled=true;try{await request('/nail-admin-orders?paymentId='+encodeURIComponent(current.paymentId)+'&action=resend',{method:'POST'});current.deliverySent=true;toast('Mensagem enviada pelo WhatsApp.');render();openOrder(current.paymentId)}catch{toast('Não foi possível enviar.')}finally{$('resend').disabled=!current.paid}};
auth=sessionStorage.getItem('nailAdminAuth')||'';if(auth){load().then(()=>{$('login').style.display='none';$('app').style.display='block'}).catch(()=>sessionStorage.removeItem('nailAdminAuth'))}
</script>
</body></html>
